# Paperclip num droplet com HTTPS público (Caddy + Let's Encrypt automático).
# Caddy termina TLS na 443 e faz reverse-proxy para o servidor (3100) pela rede
# interna do compose — o servidor NÃO é publicado no host.
#
# Pré-requisitos:
#   - DNS A de PAPERCLIP_DOMAIN apontando para o IP público do droplet
#   - portas 80 e 443 abertas no firewall
#   - .env com PAPERCLIP_DOMAIN, PAPERCLIP_PUBLIC_URL=https://<dominio>,
#     PAPERCLIP_DEPLOYMENT_EXPOSURE=public, TRUST_PROXY=1 (veja DROPLET.md)
services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: "${POSTGRES_USER:-paperclip}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}"
      POSTGRES_DB: "${POSTGRES_DB:-paperclip}"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-paperclip} -d ${POSTGRES_DB:-paperclip}"]
      interval: 2s
      timeout: 5s
      retries: 30
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  server:
    image: "${PAPERCLIP_IMAGE:-ghcr.io/danielbbarcelos/paperclip:latest}"
    # Sem publicar porta no host — só o Caddy fica exposto (80/443).
    env_file:
      - ./.env
    environment:
      DATABASE_URL: "postgres://${POSTGRES_USER:-paperclip}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB:-paperclip}"
      PORT: "3100"
      HOST: "0.0.0.0"
      SERVE_UI: "true"
      PAPERCLIP_DEPLOYMENT_MODE: "authenticated"
      PAPERCLIP_DEPLOYMENT_EXPOSURE: "${PAPERCLIP_DEPLOYMENT_EXPOSURE:-public}"
      PAPERCLIP_PUBLIC_URL: "${PAPERCLIP_PUBLIC_URL:?PAPERCLIP_PUBLIC_URL must be set (https://<dominio>)}"
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?BETTER_AUTH_SECRET must be set}"
      # Atrás do Caddy: req.ip / rate limiting por cliente corretos (o boot público exige).
      TRUST_PROXY: "${TRUST_PROXY:-1}"
      PAPERCLIP_MIGRATION_AUTO_APPLY: "${PAPERCLIP_MIGRATION_AUTO_APPLY:-true}"
    volumes:
      - paperclip-data:/paperclip
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  caddy:
    image: caddy:2
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"   # HTTP/3
    # Caddy provisiona o certificado para o domínio e faz proxy pro server:3100.
    # Entrypoint da imagem caddy:2 é nulo (o binário "caddy" vem do CMD), então a
    # lista precisa começar com "caddy".
    command:
      - caddy
      - reverse-proxy
      - --from
      - "${PAPERCLIP_DOMAIN:?PAPERCLIP_DOMAIN must be set, e.g. office.dbmv.com.br}"
      - --to
      - "server:3100"
    volumes:
      - caddy-data:/data       # persiste os certificados (não re-emitir a cada restart)
      - caddy-config:/config
    depends_on:
      - server
    restart: unless-stopped

volumes:
  pgdata:
  paperclip-data:
  caddy-data:
  caddy-config:
